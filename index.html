<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>UA Cinema Cast Receiver</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    cast-media-player { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <cast-media-player></cast-media-player>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    playerManager.setMediaPlaybackInfoHandler((loadRequest, playbackConfig) => {
      if (!Hls.isSupported()) return playbackConfig;

      const url = loadRequest.media.contentUrl || loadRequest.media.contentId || '';
      if (!url.includes('.m3u8') && loadRequest.media.contentType !== 'application/x-mpegURL') {
        return playbackConfig;
      }

      playbackConfig.manifestHandler = null;
      playbackConfig.segmentHandler = null;
      playbackConfig.licenseHandler = null;

      const player = document.querySelector('cast-media-player');
      const video = player.getMediaElement();

      if (window._hlsInstance) {
        window._hlsInstance.destroy();
        window._hlsInstance = null;
      }

      const hls = new Hls({
        xhrSetup: (xhr) => {
          xhr.setRequestHeader('User-Agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
        }
      });

      hls.loadSource(url);
      hls.attachMedia(video);
      window._hlsInstance = hls;

      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          console.error('HLS fatal error:', data.type, data.details);
          hls.destroy();
          window._hlsInstance = null;
        }
      });

      // Tell CAF not to load the source itself
      playbackConfig.autoResumeDuration = 0;
      loadRequest.media.contentUrl = '';
      loadRequest.media.contentId = '';

      return playbackConfig;
    });

    context.start({
      supportedCommands:
        cast.framework.messages.Command.ALL_BASIC_MEDIA |
        cast.framework.messages.Command.SEEK |
        cast.framework.messages.Command.PAUSE |
        cast.framework.messages.Command.STREAM_VOLUME |
        cast.framework.messages.Command.STREAM_MUTE
    });
  </script>
</body>
</html>
