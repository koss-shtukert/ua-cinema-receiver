<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>UA Cinema Cast Receiver</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <cast-media-player></cast-media-player>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    // Use hls.js for HLS playback
    const playbackConfig = new cast.framework.PlaybackConfig();

    playbackConfig.manifestHandler = (manifest) => {
      return manifest;
    };

    playbackConfig.segmentHandler = (segment) => {
      return segment;
    };

    // Intercept LOAD to attach hls.js for HLS streams
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (loadRequestData) => {
        const media = loadRequestData.media;
        const url = media.contentUrl || media.contentId;

        if (url && (url.includes('.m3u8') || media.contentType === 'application/x-mpegURL')) {
          // Let CAF handle the player element but use hls.js for loading
          if (Hls.isSupported()) {
            const video = document.querySelector('cast-media-player').getMediaElement();

            // Destroy previous instance
            if (window._hlsInstance) {
              window._hlsInstance.destroy();
            }

            const hls = new Hls({
              xhrSetup: (xhr) => {
                xhr.setRequestHeader('User-Agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
              }
            });

            hls.loadSource(url);
            hls.attachMedia(video);
            window._hlsInstance = hls;

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
              video.play();
            });

            hls.on(Hls.Events.ERROR, (event, data) => {
              if (data.fatal) {
                console.error('HLS error:', data);
                hls.destroy();
              }
            });

            // Return null to prevent CAF from loading the URL itself
            return null;
          }
        }

        return loadRequestData;
      }
    );

    context.start({
      playbackConfig: playbackConfig,
      supportedCommands:
        cast.framework.messages.Command.ALL_BASIC_MEDIA |
        cast.framework.messages.Command.SEEK |
        cast.framework.messages.Command.PAUSE |
        cast.framework.messages.Command.STREAM_VOLUME |
        cast.framework.messages.Command.STREAM_MUTE
    });
  </script>
</body>
</html>
