<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>UA Cinema</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
  </style>
</head>
<body>
  <video id="media" autoplay></video>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();
    const video = document.getElementById('media');
    let hls = null;

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (req) => {
        const url = req.media.contentUrl || req.media.contentId;
        if (!url) return req;

        if (hls) { hls.destroy(); hls = null; }

        if (Hls.isSupported() && url.includes('.m3u8')) {
          hls = new Hls();
          hls.loadSource(url);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else {
          video.src = url;
          video.play();
        }
        return null;
      }
    );

    // Custom namespace for controls from sender
    const NS = 'urn:x-cast:ua.cinema.control';
    context.addCustomMessageListener(NS, (event) => {
      const data = event.data;
      if (data.type === 'PAUSE') video.pause();
      else if (data.type === 'PLAY') video.play();
      else if (data.type === 'SEEK') video.currentTime += (data.seconds || 0);
      else if (data.type === 'STOP') {
        if (hls) { hls.destroy(); hls = null; }
        video.src = '';
      }
    });

    context.start();
  </script>
</body>
</html>
