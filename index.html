<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>UA Cinema</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    video { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    #splash {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #121212;
      z-index: 10;
      transition: opacity 0.5s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash .ua {
      color: #FFD700;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 40px;
      font-weight: bold;
      letter-spacing: 2px;
    }
    #splash .cinema {
      color: #0057B8;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 40px;
      font-weight: bold;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="splash">
    <img src="logo.png" style="width: 160px; height: 160px;">
    <div style="margin-top: 24px;">
      <span class="ua">UA </span><span class="cinema">C</span><span class="cinema">i</span><span class="cinema">n</span><span class="cinema">e</span><span class="cinema">m</span><span class="cinema">a</span>
    </div>
  </div>
  <video id="media" autoplay></video>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();
    const video = document.getElementById('media');
    let hls = null;

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (req) => {
        const url = req.media.contentUrl || req.media.contentId;
        if (!url) return req;

        if (hls) { hls.destroy(); hls = null; }

        if (Hls.isSupported() && url.includes('.m3u8')) {
          hls = new Hls();
          hls.loadSource(url);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
          document.getElementById('splash').classList.add('hidden');
          video.play();
        });
        } else {
          video.src = url;
          video.play();
        }
        return null;
      }
    );

    // Custom namespace for controls from sender
    const NS = 'urn:x-cast:ua.cinema.control';
    context.addCustomMessageListener(NS, (event) => {
      const data = event.data;
      if (data.type === 'PAUSE') video.pause();
      else if (data.type === 'PLAY') video.play();
      else if (data.type === 'SEEK') video.currentTime += (data.seconds || 0);
      else if (data.type === 'SEEK_TO') video.currentTime = (data.position || 0);
      else if (data.type === 'STOP') {
        if (hls) { hls.destroy(); hls = null; }
        video.src = '';
        document.getElementById('splash').classList.remove('hidden');
      }
    });

    // Send position updates to sender
    setInterval(() => {
      if (video.duration && !video.paused) {
        context.sendCustomMessage(NS, undefined, {
          type: 'STATUS',
          position: video.currentTime,
          duration: video.duration,
          paused: video.paused,
        });
      }
    }, 1000);

    context.start();
  </script>
</body>
</html>
