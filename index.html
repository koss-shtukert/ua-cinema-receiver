<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>UA Cinema Cast Receiver</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    video {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background: #000;
    }
  </style>
</head>
<body>
  <video id="media" autoplay></video>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();
    const video = document.getElementById('media');

    let hlsInstance = null;
    let currentMediaInfo = null;

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (loadRequestData) => {
        const media = loadRequestData.media;
        const url = media.contentUrl || media.contentId;

        if (!url || (!url.includes('.m3u8') && media.contentType !== 'application/x-mpegURL')) {
          return loadRequestData;
        }

        if (!Hls.isSupported()) {
          // Fallback: try native
          video.src = url;
          video.play();
          return null;
        }

        // Destroy previous
        if (hlsInstance) {
          hlsInstance.destroy();
          hlsInstance = null;
        }

        currentMediaInfo = media;

        const hls = new Hls({
          xhrSetup: (xhr) => {
            xhr.setRequestHeader('User-Agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
          }
        });

        hls.loadSource(url);
        hls.attachMedia(video);
        hlsInstance = hls;

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play();
        });

        hls.on(Hls.Events.ERROR, (event, data) => {
          if (data.fatal) {
            console.error('HLS error:', data.type, data.details);
            hls.destroy();
            hlsInstance = null;
          }
        });

        // Don't let CAF handle loading - we do it ourselves
        return null;
      }
    );

    // Handle PAUSE from sender
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.PAUSE,
      (requestData) => {
        video.pause();
        return null;
      }
    );

    // Handle PLAY from sender
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.PLAY,
      (requestData) => {
        video.play();
        return null;
      }
    );

    // Handle SEEK from sender
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.SEEK,
      (requestData) => {
        if (requestData.currentTime != null) {
          video.currentTime = requestData.currentTime;
        }
        return null;
      }
    );

    // Handle STOP from sender
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.STOP,
      (requestData) => {
        if (hlsInstance) {
          hlsInstance.destroy();
          hlsInstance = null;
        }
        video.src = '';
        video.load();
        return null;
      }
    );

    // Handle VOLUME from sender
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.SET_VOLUME,
      (requestData) => {
        if (requestData.volume) {
          if (requestData.volume.level != null) {
            video.volume = requestData.volume.level;
          }
          if (requestData.volume.muted != null) {
            video.muted = requestData.volume.muted;
          }
        }
        return null;
      }
    );

    context.start();
  </script>
</body>
</html>
