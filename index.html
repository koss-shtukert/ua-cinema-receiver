<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>UA Cinema Cast Receiver</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    #splash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #121212;
      z-index: 10;
    }
    #splash h1 {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 48px;
      font-weight: bold;
      margin: 0;
    }
    #splash .ua { color: #FFD700; }
    #splash .cinema { color: #0057B8; }
    #splash p {
      color: #888;
      font-family: sans-serif;
      font-size: 18px;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div id="splash">
    <h1><span class="ua">UA</span> <span class="cinema">Cinema</span></h1>
    <p>Очікування трансляції...</p>
  </div>
  <video id="player" autoplay></video>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (loadRequestData) => {
        const media = loadRequestData.media;
        const url = media.contentUrl || media.contentId;

        if (url && (url.includes('.m3u8') || media.contentType === 'application/x-mpegURL')) {
          return new Promise((resolve, reject) => {
            const video = document.getElementById('player');
            const splash = document.getElementById('splash');

            if (Hls.isSupported()) {
              const hls = new Hls({
                xhrSetup: (xhr) => {
                  xhr.setRequestHeader('User-Agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
                }
              });

              hls.loadSource(url);
              hls.attachMedia(video);

              hls.on(Hls.Events.MANIFEST_PARSED, () => {
                splash.style.display = 'none';
                video.play();
              });

              hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                  console.error('HLS fatal error:', data);
                  hls.destroy();
                  reject();
                }
              });

              // Store hls instance for cleanup
              window._hlsInstance = hls;
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
              // Native HLS (Safari/iOS)
              video.src = url;
              video.addEventListener('loadedmetadata', () => {
                splash.style.display = 'none';
                video.play();
              });
            } else {
              reject();
              return;
            }

            // Don't let CAF handle this - we handle playback ourselves
            resolve(null);
          });
        }

        return loadRequestData;
      }
    );

    // Handle STOP
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.STOP,
      (requestData) => {
        if (window._hlsInstance) {
          window._hlsInstance.destroy();
          window._hlsInstance = null;
        }
        document.getElementById('player').src = '';
        document.getElementById('splash').style.display = 'flex';
        return requestData;
      }
    );

    context.start();
  </script>
</body>
</html>
